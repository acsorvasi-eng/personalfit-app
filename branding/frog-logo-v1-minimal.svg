<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="#0d9488"/>

  <!-- Frog face - minimalist -->
  <!-- Head shape -->
  <ellipse cx="200" cy="220" rx="110" ry="90" fill="#f0fdfa"/>

  <!-- Left eye bump -->
  <circle cx="145" cy="155" r="45" fill="#f0fdfa"/>
  <!-- Right eye bump -->
  <circle cx="255" cy="155" r="45" fill="#f0fdfa"/>

  <!-- Left eye -->
  <circle cx="145" cy="155" r="20" fill="#134e4a"/>
  <!-- Left eye shine -->
  <circle cx="152" cy="148" r="6" fill="#f0fdfa"/>

  <!-- Right eye -->
  <circle cx="255" cy="155" r="20" fill="#134e4a"/>
  <!-- Right eye shine -->
  <circle cx="262" cy="148" r="6" fill="#f0fdfa"/>

  <!-- Smile -->
  <path d="M 155 240 Q 200 280 245 240" fill="none" stroke="#134e4a" stroke-width="5" stroke-linecap="round"/>

  <!-- Cheek dots -->
  <circle cx="140" cy="235" r="12" fill="#99f6e4" opacity="0.6"/>
  <circle cx="260" cy="235" r="12" fill="#99f6e4" opacity="0.6"/>
</svg>