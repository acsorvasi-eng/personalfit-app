<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background - rounded square (App Store style) -->
  <rect width="400" height="400" rx="90" fill="#0d9488"/>

  <!-- Frog - ultra minimal, just eyes peeking -->
  <!-- This is the "peek" concept - frog peeking from bottom -->

  <!-- Head curve peeking from bottom -->
  <ellipse cx="200" cy="320" rx="130" ry="110" fill="#ccfbf1"/>

  <!-- Left eye bump -->
  <circle cx="148" cy="210" r="52" fill="#ccfbf1"/>
  <!-- Right eye bump -->
  <circle cx="252" cy="210" r="52" fill="#ccfbf1"/>

  <!-- Left eye -->
  <circle cx="148" cy="210" r="24" fill="#134e4a"/>
  <circle cx="155" cy="203" r="7" fill="#ccfbf1"/>

  <!-- Right eye -->
  <circle cx="252" cy="210" r="24" fill="#134e4a"/>
  <circle cx="259" cy="203" r="7" fill="#ccfbf1"/>
</svg>