<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <!-- Full wordmark with Kix icon -->

  <!-- Kix frog icon (small, left) -->
  <!-- Head -->
  <ellipse cx="80" cy="110" rx="50" ry="40" fill="#0d9488"/>
  <!-- Left eye -->
  <circle cx="60" cy="80" r="22" fill="#0d9488"/>
  <circle cx="60" cy="80" r="14" fill="white"/>
  <circle cx="63" cy="78" r="7" fill="#134e4a"/>
  <circle cx="66" cy="75" r="3" fill="white"/>
  <!-- Right eye -->
  <circle cx="100" cy="80" r="22" fill="#0d9488"/>
  <circle cx="100" cy="80" r="14" fill="white"/>
  <circle cx="103" cy="78" r="7" fill="#134e4a"/>
  <circle cx="106" cy="75" r="3" fill="white"/>
  <!-- Smile -->
  <path d="M 60 118 Q 80 135 100 118" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round"/>

  <!-- Wordmark "kix" -->
  <text x="160" y="130" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="800" font-size="86" fill="#134e4a" letter-spacing="6">kix</text>

  <!-- Tagline -->
  <text x="163" y="162" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="400" font-size="18" fill="#0d9488" letter-spacing="6">TRANSFORM WHAT YOU EAT</text>
</svg>