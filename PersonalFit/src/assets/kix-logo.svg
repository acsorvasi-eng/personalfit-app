  <!-- Right nostril -->
  <ellipse cx="59" cy="52" rx="1" ry="1.2" fill="#0f766e"/>

  <!-- Cheek blush left -->
  <path d="M32,58 C32,56 34,54 37,54 C39,54 40,56 40,58 C40,60 39,61 37,61 C34,61 32,60 32,58Z" fill="rgba(255,255,255,0.12)"/>

