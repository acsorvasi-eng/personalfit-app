<h2>Onboarding 1 — végleges szöveg</h2>
<p class="subtitle">Tányér + szív, szív lejjebb pozicionálva · új cím és szöveg</p>

<style>
* { box-sizing: border-box; }
.center { display: flex; justify-content: center; margin: 28px 0 20px; }
.phone {
  width: 200px; border-radius: 38px; overflow: hidden;
  box-shadow: 0 16px 56px rgba(0,0,0,0.13); border: 1.5px solid #e2e8f0;
}
.notch { width: 64px; height: 8px; border-radius: 0 0 7px 7px; margin: 0 auto; background: #e2e8f0; }
.ob {
  min-height: 430px; background: white;
  display: flex; flex-direction: column; padding: 16px 18px 22px;
}
.ob-top { display: flex; justify-content: flex-end; min-height: 20px; }
.skip { font-size: 0.46rem; color: #94a3b8; }
.ob-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 6px 0 0;
}
.illus { width: 116px; height: 116px; margin-bottom: 18px; flex-shrink: 0; }

@keyframes draw {
  from { stroke-dashoffset: 900; }
  to   { stroke-dashoffset: 0; }
}
.d1 { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1.6s cubic-bezier(0.4,0,0.2,1) forwards; }
.d2 { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1.6s 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
.d3 { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1.6s 0.65s cubic-bezier(0.4,0,0.2,1) forwards; }

.ob-title {
  font-size: 1.02rem; font-weight: 800; color: #0f172a;
  line-height: 1.35; margin-bottom: 11px;
}
.ob-desc { font-size: 0.54rem; color: #64748b; line-height: 1.72; max-width: 150px; }
.ob-footer { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.dots { display: flex; gap: 5px; align-items: center; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #e2e8f0; }
.dot.on { background: #0d9488; width: 14px; border-radius: 3px; }
.btn-teal {
  width: 100%; background: #0d9488; color: white;
  border-radius: 13px; padding: 12px; font-size: 0.65rem; font-weight: 700; text-align: center;
}
</style>

<div class="center">
  <div class="phone">
    <div class="notch"></div>
    <div class="ob">
      <div class="ob-top"><div class="skip">Kihagyás</div></div>
      <div class="ob-body">
        <svg class="illus" viewBox="0 0 116 116" fill="none">
          <!-- plate outer -->
          <circle class="d1" cx="58" cy="62" r="32" stroke="#0f172a" stroke-width="2"/>
          <!-- plate inner ring -->
          <circle class="d1" cx="58" cy="62" r="23" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="4 3"/>
          <!-- fork left -->
          <path class="d2" d="M20 30 L20 48 M20 48 L20 58 M18 30 L18 38 C18 41 22 41 22 38 L22 30" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- knife right -->
          <path class="d2" d="M96 30 L96 58 M96 30 C96 30 100 35 100 42 C100 47 96 49 96 49" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- heart — centred on plate, clearly inside the inner ring -->
          <path class="d3" d="M58 57 C58 57 48 50 48 44 C48 39.5 52.5 37 58 42 C63.5 37 68 39.5 68 44 C68 50 58 57 58 57 Z" stroke="#0d9488" stroke-width="2.2" stroke-linejoin="round"/>
        </svg>
        <div class="ob-title">Ne alkalmazkodj<br>az étrendhez.<br>Az alkalmazkodjon hozzád.</div>
        <div class="ob-desc">Az étrended a helyi ételekre és a szokásaidra épül — így végre működik a valós életben is.</div>
      </div>
      <div class="ob-footer">
        <div class="dots">
          <div class="dot on"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="btn-teal">Tovább →</div>
      </div>
    </div>
  </div>
</div>
